<!doctype html>
<html>
  <head>
    <title>JobPilot</title>

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(-45deg, #0f172a, #1e3a8a, #9333ea, #020617);
        background-size: 400% 400%;
        animation: gradientMove 12s ease infinite;
        color: #e2e8f0;
        overflow-y: auto;
      }

      @keyframes gradientMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .container {
        width: 700px;
        margin: 80px auto;
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
      }

      .controls {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 25px;
      }

      input[type="file"] {
        padding: 8px;
        background: #1e293b;
        color: white;
        border: 1px solid #334155;
        border-radius: 6px;
      }

      button {
        padding: 12px 20px;
        border: none;
        background: #da3bf6;
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
      }

      .job {
        background: #c65f99;
        padding: 15px;
        margin-bottom: 12px;
        border-radius: 10px;
        border: 1px solid #334155;
      }

      .title {
        font-weight: 600;
      }
      .company {
        color: #f1f3f5;
      }
      .score {
        margin: 6px 0;
      }

      .high {
        color: #22c55e;
      }
      .mid {
        color: #eab308;
      }
      .low {
        color: #ef4444;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🚀 JobPilot</h1>

      <div class="controls">
        <input type="file" id="resumeFile" accept=".pdf" />
        <button onclick="runAgent()">Run Job Search</button>
      </div>

      <div id="results"></div>
    </div>

    <script>
      async function runAgent() {
        const fileInput = document.getElementById("resumeFile");

        if (!fileInput.files.length) {
          alert("Please upload your resume first");
          return;
        }

        const file = fileInput.files[0];

        const formData = new FormData();
        formData.append("file", file);

        const res = await fetch("http://127.0.0.1:8000/run-agent-upload", {
          method: "POST",
          body: formData,
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        let container = document.getElementById("results");
        container.innerHTML = "<p>🔍 Analyzing jobs...</p>";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split("\n");

          lines.forEach((line) => {
            if (!line.trim()) return;

            const job = JSON.parse(line);

            let scoreClass = "low";
            if (job.score >= 70) scoreClass = "high";
            else if (job.score >= 40) scoreClass = "mid";

            container.innerHTML += `
            <div class="job">
              <div class="title">${job.title}</div>
              <div class="company">${job.company}</div>
              <div class="score ${scoreClass}">Match Score: ${job.score}</div>
              <a href="${job.link}" target="_blank">Apply →</a>
            </div>
          `;
          });
        }
      }
    </script>
  </body>
</html>
